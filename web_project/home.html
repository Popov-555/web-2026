<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link type="text/css" rel="stylesheet" href="/web_project/src/style/css/index.css">
</head>

<body>
    <div class="home-container">
        <div class="home-container__nav">
            <nav class="home-container__nav-item">
                <div class="home-container__nav-block">
                    <a class="home-container__nav-a-link"  href="home" aria-label="Главная">
                        <img src="src/image/home.svg" alt="Главная страница" class="home-container__nav-item-img">
                        <img class="home-container__nav-item-dot" src="src/image/dot.svg" alt="Активная вкладка">
                    </a>
                </div>
                <div class="home-container__nav-block">
                     <a href="profile" aria-label="Профиль">
                        <img src="src/image/user.svg" alt="Страница пользователя" class="home-container__nav-item-img">
                     </a>
                </div>
               <div class="home-container__nav-block">
                    <a href="#" aria-label="Добавить пост">
                        <img src="src/image/plus.svg" alt="Добавить пост" class="home-container__nav-item-img">
                    </a>
               </div>
            </nav>
        </div>  
        <div class="home-container__block">
            <div class="home-container__block-post">
                <div class="home-container__block-main">
                    <div class="home-container__block-user">
                        <img class="home-container__block-img" src="/web_project/src/image/user_ivan.svg" alt="Иконка пользователя">
                        <span class="home-container__block-text-user">Ваня Денисов</span>
                    </div>
                    <div class="home-container__block-add">
                        <button type="button" class="home-container__block-add-btn"></button>
                    </div>
                </div>
                <div class="home-container__block-count-img">1/3</div>
                <div class="home-container__block-slider">
                    <div class="home-container__block-item-slider home-container__block-item-slider_left">
                        <a href="# " class="home-container__block-slider-img-left"></a>
                    </div>
                    <div class="home-container__block-item-slider">
                        <a href="#" class="home-container__block-slider-img-right"></a>
                    </div>
                </div>
                <img class="home-container__block-image-post" src="src/image/home_ivan.png" alt="Картинка поста">
                <div class="home-container__block-like">
                    <img class="home-container__block-like-img" src="/web_project/src/image/like.svg" alt="Эмодзи">
                    <p class="home-container__block-like-count">203</p>
                </div>
                <div class="home-container__block-description">
                    <blockquote>
                        <p class="home-container__block-description-text">
                            Так красиво сегодня на улице! Настоящая зима)) Вспоминается
                            Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в городке, занесенном снегом
                            по ручку двери...»
                        </p>
                    </blockquote>
                    <a class="home-container__block-link">ещё</a>
                    <span class="home-container__block-date">2 часа назад</span>
                </div>
            </div>
            <div class="home-container__block-post">
                <div class="home-container__block-main">
                    <div class="home-container__block-user">
                        <img class="home-container__block-img" src="/web_project/src/image/user_liza.svg" alt="Иконка пользователя">
                        <span class="home-container__block-text-user">Лиза Дёмина</span>
                    </div>
                </div>
                <img class="home-container__block-image-post" src="src/image/home_liza.png" alt="Картинка поста">
            </div>
        </div>
    </div>
</body>
</html>
