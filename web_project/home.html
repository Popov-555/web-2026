<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="src/index.css">
</head>
<body>
    <div class="home-container">
        <div class="home-container__nav">
            <div class="home-container__nav-item">
                <img src="src/image/home.svg" alt="not icon" class="home-container__nav-item-img">
                <img src="src/image/user.svg" alt="not icon" class="home-container__nav-item-img">
                <img src="src/image/plus.svg" alt="not icon" class="home-container__nav-item-img">
            </div>
        </div>
        <div class="home-container__block">
            <div class="home-container__block-frame"></div>
            <div class="home-container__block-post">
                <div class="home-container__block-main">
                    <div class="home-container__block-user">
                        <img class="home-container__block-img" src="src/image/user_ivan.svg" alt="No avatar">
                        <span class="home-container__block-text-user">Ваня Денисов</span>
                    </div>
                    <div class="home-container__block-add">
                        <button type="button" class="home-container__block-add-btn"></button>
                    </div>
                </div>
                <img class="home-container__block-image-post" src="src/image/home_ivan.png" alt="My image not found">
                <div class="home-container__block-like">
                    <img class="home-container__block-like-img" src="src/image/like.svg" alt="not like">
                    <button class="home-container__block-like-btn">203</button>
                </div>
                <div class="home-container__block-description">
                    <blockquote>
                        <p>
                            Так красиво сегодня на улице! Настоящая зима)) Вспоминается 
                            Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в городке, занесенном снегом по ручку двери...» 
                        </p>
                    </blockquote>
                    <a class="home-container__block-link">ещё</a>
                    <span class="home-container__block-date">2 часа назад</span>
                </div>
            </div>
            <div class="home-container__block-post">
                    <div class="home-container__block-main">
                        <div class="home-container__block-user">
                            <img class="home-container__block-img" src="src/image/user_liza.svg" alt="No avatar">
                            <span class="home-container__block-text-user">Лиза Дёмина</span>
                        </div>
                    </div>
                    <img class="home-container__block-image-post" src="src/image/home_liza.png" alt="My image not found">
            </div>   
        </div>
    </div>
</body>
</html>
