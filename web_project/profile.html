<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="src/index.css">
</head>
<body>
     <div class="profile-container">
        <div class="home-container__nav">
            <div class="home-container__nav-item">
                <img src="src/image/home.svg" alt="no icon" class="home-container__nav-item-img">
                <img src="src/image/user.svg" alt="no icon" class="home-container__nav-item-img">
                <img src="src/image/plus.svg" alt="no icon" class="home-container__nav-item-img">
            </div>
        </div>
        <div class="home-container__block">
            <div class="home-container__block-frame"></div>
            <div class="profile-container__block">
                <img class="profile-container__block-avatar" src="src/image/user_ivan.svg" alt="No avatar">
                <span class="profile-container__block-text">Ваня Денисов</span>
                <p>Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
                <div class="profile-container__dop">
                    <img class="profile-container__picture" src="src/image/picture.svg" alt="not picture">
                    <span class="profile-container_text">43 поста</span>
                </div>
            </div>
            
            <div class="profile-container__post">
                <img class="profile-container__image-post" src="src/image/city_show_post.png" alt="no image post">
                <img class="profile-container__image-post" src="src/image/city_post.png" alt="no image post">
                <img class="profile-container__image-post" src="src/image/cake_post.png" alt="no image post">
                <img class="profile-container__image-post" src="src/image/people_post.png" alt="no image post">
                <img class="profile-container__image-post" src="src/image/cofe_post.png" alt="no image post">
                <img class="profile-container__image-post" src="src/image/book_post.png" alt="no image post">
            </div>
        </div>
    </div>
</body>
</html>
