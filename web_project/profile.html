<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="/web_project/src/style/css/index.css">
</head>
<body>
     <div class="profile-container">
         <div class="home-container__nav">
            <nav class="home-container__nav-item">
                <div class="home-container__nav-block">
                    <a href="home" aria-label="Главная">
                        <img src="src/image/home.svg" alt="Главная страница" class="home-container__nav-item-img">
                    </a>
                </div>
                <div class="home-container__nav-block">
                     <a class="home-container__nav-a-link"  href="profile" aria-label="Профиль">
                        <img src="src/image/user.svg" alt="Страница пользователя" class="home-container__nav-item-img">
                         <img class="home-container__nav-item-dot" src="src/image/dot.svg" alt="Активная вкладка">
                     </a>
                </div>
               <div class="home-container__nav-block">
                    <a href="#" aria-label="Добавить пост">
                        <img src="src/image/plus.svg" alt="Добавить пост" class="home-container__nav-item-img">
                    </a>
               </div>
            </nav>
        </div>
        <div class="home-container__block">
            <div class="profile-container__block">
                <img class="profile-container__block-avatar" src="src/image/user_ivan.svg" alt="Иконка пользователя">
                <h1 class="profile-container__block-text">Ваня Денисов</span>
                <p class="profile-container__block-p">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
                <div class="profile-container__dop">
                    <img class="profile-container__picture" src="src/image/picture.svg" alt="Картинка поста">
                    <span class="profile-container__text">43 поста</span>
                </div>
            </div>
            <div class="profile-container__post">
                <img class="profile-container__image-post" src="src/image/city_show_post.png" alt="Снег в городе">
                <img class="profile-container__image-post" src="src/image/city_post.png" alt="Мой город">
                <img class="profile-container__image-post" src="src/image/cake_post.png" alt="Пироженое">
                <img class="profile-container__image-post" src="src/image/people_post.png" alt="Моя компания">
                <img class="profile-container__image-post" src="src/image/cofe_post.png" alt="Мое кофе">
                <img class="profile-container__image-post" src="src/image/book_post.png" alt="Мои книги">
            </div>
        </div>
    </div>
</body>
</html>
